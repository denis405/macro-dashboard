name: Update macro data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: update-macro-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update indicator data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TRADING_ECONOMICS_API_KEY: ${{ secrets.TRADING_ECONOMICS_API_KEY }}
        run: |
          set -euo pipefail
          python scripts/update_pmi.py || echo "PMI update skipped"
          python scripts/update_copper.py || echo "Copper update skipped"
          python scripts/update_vix.py || echo "VIX update skipped"
          python scripts/update_yield_curve.py || echo "Yield curve update skipped"
          python scripts/calculate_composite.py

      - name: Commit and push updated data
        run: |
          if git diff --quiet -- data/; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Update macro dashboard data"

          for attempt in 1 2 3 4 5; do
            echo "Syncing with origin/main (attempt $attempt/5)..."
            git fetch origin main
            git rebase origin/main

            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push rejected, retrying..."
            sleep "$attempt"
          done

          echo "Failed to push after 5 attempts."
          exit 1
