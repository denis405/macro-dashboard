name: Update macro indicators

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update indicators JSON
        run: python scripts/update_indicators.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/indicators.json; then
            echo "No indicator changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/indicators.json
          git commit -m "Update macro indicators"

          branch="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin "$branch" && git push origin "$branch"; then
              exit 0
            fi
            echo "Push rejected, retrying ($attempt/5)..."
            sleep "$attempt"
          done

          echo "Failed to push after 5 attempts."
          exit 1
