name: Update macro indicators

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update indicators JSON
        run: python scripts/update_indicators.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/indicators.json; then
            echo "No indicator changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/indicators.json
          git commit -m "Update macro indicators"
          git push
