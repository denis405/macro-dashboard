name: Update macro indicators

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 1-5"

concurrency:
  group: update-indicators
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Update indicators JSON
        run: python scripts/update_indicators.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/indicators.json; then
            echo "No indicator changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/indicators.json
          git commit -m "Update macro indicators"

          for attempt in 1 2 3 4 5; do
            echo "Syncing with origin/main (attempt $attempt/5)..."
            git fetch origin main
            git rebase origin/main

            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push rejected, retrying..."
            sleep "$attempt"
          done

          echo "Failed to push after 5 attempts."
          exit 1
